name: Android ARM64 Vulkan Build

on:
  workflow_dispatch: # Allows you to run it manually

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout llama.cpp
        uses: actions/checkout@v4
        with:
          repository: ggerganov/llama.cpp
          fetch-depth: 1

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r26b # 2026 standard for stable ARM64 builds

      - name: Build llama.cpp for Android
        run: |
          mkdir build-android
          cd build-android
          cmake .. \
            -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-28 \
            -DGGML_VULKAN=ON \
            -DCMAKE_BUILD_TYPE=Release
          
          make -j$(nproc)

      - name: Upload Binaries
        uses: actions/upload-artifact@v4
        with:
          name: llama-vulkan-android-arm64
          path: |
            build-android/bin/llama-cli
            build-android/bin/llama-server
            
