name: run

on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: set android 
        uses: android-actions/setup-android@v3

      - name: Test
        run: |
          sdkmanager --list
          gradle --version
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
           name: my-artifact
           path: Calculator/target  
