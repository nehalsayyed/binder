name: Gentoo Fastfetch Run

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  gentoo-run:
    runs-on: ubuntu-latest
    container:
      image: gentoo/stage3:latest
    
    steps:
      - name: Update Portage tree
        # We use --sync to get the latest package definitions
        run: emerge --sync --quiet

      - name: Install Fastfetch
        # Gentoo usually requires accepting keywords for newer tools
        run: |
          echo "app-misc/fastfetch ~amd64" >> /etc/portage/package.accept_keywords
          emerge --ask n --verbose app-misc/fastfetch

      - name: Run Fastfetch
        run: fastfetch
        
