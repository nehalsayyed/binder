name: Test Mac Metal - Tiny Diffusion

on:
  workflow_dispatch:
    inputs:
      prompt:
        description: 'Image generation prompt'
        required: true
        default: 'A vibrant miniature bonsai tree sitting on top of a futuristic metal computer chip, digital art'

jobs:
  test-metal:
    runs-on: macos-14

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install PyTorch and Hugging Face Transformers
        run: |
          python -m pip install --upgrade pip
          pip install torch torchvision diffusers transformers accelerate

      - name: Run Lightweight Inference via Metal (MPS)
        run: |
          cat << 'EOF' > generate_test.py
          import os
          import torch
          from diffusers import StableDiffusionPipeline

          prompt = os.getenv("INPUT_PROMPT", "A beautiful bonsai tree")
          print(f"Generating prompt: '{prompt}'")

          model_id = "segmind/tiny-sd"
          
          print("Loading model components into CPU memory...")
          pipe = StableDiffusionPipeline.from_pretrained(model_id, torch_dtype=torch.float32)
          
          # OPTIMIZATION: Slice attention computations to save memory
          print("Enabling attention slicing optimization...")
          pipe.enable_attention_slicing()
          
          if torch.backends.mps.is_available():
              device = torch.device("mps")
              print("SUCCESS: Dispatching model layers to Mac Metal GPU accelerator.")
          else:
              device = torch.device("cpu")
              print("WARNING: Metal context unavailable. Defaulting execution back to CPU.")

          pipe = pipe.to(device)

          print("Starting image diffusion passes...")
          image = pipe(prompt, num_inference_steps=15).images[0]

          output_name = "metal_test_output.png"
          image.save(output_name)
          print(f"Image successfully generated and saved as {output_name}!")
          EOF

          python generate_test.py
        env:
          INPUT_PROMPT: ${{ github.event.inputs.prompt }}
          # FIX: Prevents the MPS backend out-of-memory panic
          PYTORCH_MPS_HIGH_WATERMARK_RATIO: "0.0"
          # Keep .NET limits clamped safely low if .NET tools run concurrently
          DOTNET_GCHeapHardLimit: "140000000" 

      - name: Upload Generated Image Artifact
        uses: actions/upload-artifact@v4
        with:
          name: mac-metal-generated-image
          path: metal_test_output.png
          retention-days: 3
          
