name: x64 KVM Diagnostic
on: workflow_dispatch

jobs:
  check-x64-kvm:
    runs-on: ubuntu-latest # This defaults to x64
    steps:
      - name: CPU Info
        run: |
          lscpu | grep -E "Virtualization|Hypervisor"
          # Check for VMX (Intel) or SVM (AMD) flags
          grep -E "vmx|svm" /proc/cpuinfo || echo "No hardware virtualization flags found"

      - name: Enable KVM Access
        run: |
          # The "99-kvm4all" trick for standard runners
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
          ls -l /dev/kvm

      - name: Install Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-system-x86 cpu-checker

      - name: Verify with kvm-ok
        run: sudo kvm-ok

      - name: Test QEMU Acceleration
        run: |
          # Run a tiny check to see if KVM initializes
          qemu-system-x86_64 -accel kvm -display none -monitor stdio <<EOF
          quit
          EOF
          if [ $? -eq 0 ]; then
            echo "🚀 KVM is active and ready on x64!"
          else
            echo "❌ KVM failed."
          fi
          
