name: KVM Support Check (ARM64)
on: 
  workflow_dispatch: # Allows you to run this manually from the Actions tab

jobs:
  check-kvm:
    runs-on: ubuntu-24.04-arm # Using the 2026 standard ARM runner
    steps:
      - name: System Info
        run: |
          echo "Architecture: $(uname -m)"
          echo "Kernel: $(uname -r)"

      - name: Check for KVM Device
        run: |
          if [ -e /dev/kvm ]; then
            echo "✅ /dev/kvm exists."
            ls -l /dev/kvm
          else
            echo "❌ /dev/kvm NOT found."
          fi

      - name: Attempt to Enable KVM Permissions
        run: |
          # Sometimes it exists but the 'runner' user isn't in the group
          sudo chmod 666 /dev/kvm || echo "Could not change permissions"

      - name: Install QEMU and CPU Checker
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-system-arm cpu-checker

      - name: Verify KVM via kvm-ok
        run: |
          # kvm-ok is the definitive tool to check for nested virtualization
          sudo kvm-ok || echo "kvm-ok reported failure"

      - name: QEMU Hardware Acceleration Test
        run: |
          # This command will fail quickly if KVM isn't actually working
          qemu-system-aarch64 -accel kvm -display none -M virt -cpu host -monitor stdio <<EOF
          quit
          EOF
          if [ $? -eq 0 ]; then
            echo "🚀 SUCCESS: KVM is working and usable!"
          else
            echo "⚠️ KVM initialization failed. Falling back to software emulation."
          fi
          
