name: Build ImageGlass

on:
  workflow_dispatch: # Manual trigger

jobs:
  build:
    runs-on: windows-latest

    steps:
      # 1. Checkout the ImageGlass source code
      - name: Checkout ImageGlass
        uses: actions/checkout@v4
        with:
          repository: d2phap/ImageGlass
          fetch-depth: 1

      # 2. Setup MSBuild
      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      # 3. Setup NuGet
      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2

      # 4. Restore NuGet Packages
      - name: Restore NuGet Packages
        run: nuget restore Source/ImageGlass.sln

      # 5. Build the Solution
      - name: Build ImageGlass (Release)
        run: |
          msbuild Source/ImageGlass.sln `
            -p:Configuration=Release `
            -p:Platform="Any CPU" `
            -m

      # 6. Upload the Build Artifacts
      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ImageGlass-Binary
          # ImageGlass outputs to Source/ImageGlass/bin/Release/net8.0-windows/
          path: Source/ImageGlass/bin/Release/
          retention-days: 5
          
