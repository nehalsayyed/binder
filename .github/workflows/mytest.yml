name: "Capture System Info Video"

on: 
  workflow_dispatch: # Allows manual trigger from the Actions tab

jobs:
  record-system:
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Start Background Recording
        # 'start' runs ffmpeg in a separate process so the workflow can continue
        # gdigrab captures the desktop at 30fps
        run: |
          start ffmpeg -f gdigrab -framerate 30 -i desktop -vcodec libx264 -pix_fmt yuv420p -preset ultrafast capture.mp4
        shell: cmd

      - name: Run System Information Tool
        run: |
          echo "Generating System Information..."
          # Generates a text report (msinfo32 usually pops a UI, systeminfo is CLI)
          systeminfo
          # Optional: Open msinfo32 for 10 seconds to ensure it's in the video
          start msinfo32
          Start-Sleep -Seconds 15
        shell: powershell

      - name: Stop Recording
        # Gracefully stop ffmpeg so the MP4 file is finalized correctly
        run: |
          taskkill /IM ffmpeg.exe /T /F
        shell: cmd
        if: always()

      - name: Upload Video Artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-screen-capture
          path: capture.mp4
          retention-days: 5
          
