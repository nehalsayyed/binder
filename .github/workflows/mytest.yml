name: PipeWire Info Check

on: workflow_dispatch

jobs:
  check-audio-stack:
    runs-on: ubuntu-latest
  

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install PipeWire and Utilities
        run: |
          sudo apt-get update
          sudo apt-get install -y fastfetch && fastfetch

      
