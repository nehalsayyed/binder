name: Build Solr

on:
  workflow_dispatch: # Allows you to run it manually from the Actions tab

jobs:
  build-job:
    runs-on: ubuntu-latest
    steps:
      # STEP 1: MUST BE FIRST. This downloads your code into the runner.
      - name: Checkout Repository
        uses: actions/checkout@v4

      # STEP 2: Setup Java. Now that the code is there, the cache will find the gradle files.
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      # STEP 3: Fix permissions (Standard requirement for Linux runners)
      - name: Make Gradlew Executable
        run: chmod +x gradlew

      # STEP 4: Run the actual build
      - name: Build with Gradle
        run: ./gradlew assemble

      # STEP 5: Save the results
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: solr-dist
          path: solr/packaging/build/distributions/
          
