name: Build and Test Bonsai Image Demo

on:
  workflow_dispatch: # Allows manual triggering from the Actions tab

jobs:
  build-and-test:
    runs-on: macos-latest
    
    # Force all steps to run inside the subdirectory
    defaults:
      run:
        working-directory: ./Bonsai-Image-Demo

    steps:
      # Step 1: Check out the repository code
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 2: Make sure the setup script is executable and run it
      - name: Run Setup
        run: |
          chmod +x ./setup.sh
          ./setup.sh

      # Step 3: Make sure the generation script is executable and run it
      - name: Generate Image
        run: |
          chmod +x ./scripts/generate.sh
          ./scripts/generate.sh --prompt "An icy Bonsai tree, in a rainy forest with a snowy mountains in the background, photo realistic."
          
