name: Build Qt WASM
on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 1. Install the required version of Qt for WebAssembly
      - name: Install Qt for WASM
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.7.2'      # Set your exact target Qt version here
          target: 'wasm'        # Tells it to download the Wasm packages
          arch: 'wasm_32'       # Architecture target for Emscripten compilation

      # 2. Build the application using the injected environments
      - name: Build Application
        run: |
          mkdir build && cd build
          # The install action automatically exposes `qt-cmake` to the path
          qt-cmake .. -DCMAKE_BUILD_TYPE=Release
          cmake --build . --parallel $(nproc)

      # 3. Zip or bundle the outputs
      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: qt-wasm-output
          path: build/
          
