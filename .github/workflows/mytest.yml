name: Build Arti Android APK

on:
  workflow_dispatch: # Allows manual triggering

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          repository: 'guardianproject/tormobile/arti-mobile-ex'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: armv7-linux-androideabi, aarch64-linux-android, i686-linux-android, x86_64-linux-android

      - name: Set up Android NDK
        uses: nandroid/setup-ndk@v3
        with:
          ndk-version: r25c # Matches common Rust-Android build requirements

      - name: Install cargo-ndk
        run: cargo install cargo-ndk

      - name: Build with Gradle
        run: ./gradlew assembleDebug
        env:
          # Required for Rust-Android-Gradle plugin to find the NDK
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: arti-mobile-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          
