name: Build ImageGlass

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      # 1. Checkout into the ROOT directory
      - name: Checkout ImageGlass
        uses: actions/checkout@v4
        with:
          repository: d2phap/ImageGlass
          fetch-depth: 1
          path: '.' 

      # 2. Install .NET 8 (Required for ImageGlass)
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      # 3. Restore and Build using the .slnx file
      # 'dotnet build' automatically performs a nuget restore
      - name: Build ImageGlass
        run: |
          dotnet build Source/ImageGlass.slnx --configuration Release

      # 4. Upload the Build Artifacts
      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ImageGlass-Binary
          # The output typically lands in the main project's bin folder
          path: Source/ImageGlass/bin/Release/net8.0-windows/
          retention-days: 5
          
