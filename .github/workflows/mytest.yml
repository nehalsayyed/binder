name: Build Common stable-diffusion.cpp (ARM64 Text-to-Video)

on:
  workflow_dispatch: # Allows you to manually trigger the build from the Actions tab

jobs:
  build-arm64:
    runs-on: ubuntu-24.04-arm

    steps:
      - name: Checkout Code Base
        uses: actions/checkout@v4
        with:
          repository: leejet/stable-diffusion.cpp
          submodules: 'recursive'
          fetch-depth: 0

      - name: Install System Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake git pkg-config

      - name: Configure CMake
        run: |
          mkdir build
          cd build
          # Standard dynamic build with all examples (cli, server, etc.) enabled
          cmake .. \
            -DCMAKE_BUILD_TYPE=Release \
            -DSD_BUILD_SHARED_LIBS=OFF \
            -DSD_BUILD_EXAMPLES=ON \
            -DGGML_OPENMP=ON

      - name: Compile Source Code
        run: |
          cd build
          cmake --build . --config Release --parallel $(nproc)

      - name: Package Binaries
        run: |
          mkdir -p release-package
          cp build/bin/sd-cli release-package/
          cp build/bin/sd-server release-package/
          cd release-package
          tar -czvf sdcpp-linux-arm64-common.tar.gz sd-cli sd-server

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: sdcpp-linux-arm64-common
          path: release-package/sdcpp-linux-arm64-common.tar.gz
          retention-days: 5
          
