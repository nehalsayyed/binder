name: Build PeaZip Windows

on:
  workflow_dispatch: # Manual trigger

jobs:
  build:
    runs-on: windows-latest

    steps:
      # 1. Checkout the PeaZip source code
      - name: Checkout PeaZip
        uses: actions/checkout@v4
        with:
          repository: peazip/PeaZip
          fetch-depth: 1

      # 2. Install Lazarus and Free Pascal
      - name: Install Lazarus
        uses: gcarreno/setup-lazarus@v3
        with:
          lazarus-version: "stable"
          with-cache: true

      # 3. Register required Lazarus Packages (.lpk)
      # These must be added to the environment before compiling the main projects
      - name: Install Dependencies
        run: |
          lazbuild --add-package dev/metadarkstyle/metadarkstyle.lpk
          lazbuild --add-package dev/dragdropfilesdll/DragDropLazarus.lpk

      # 4. Build the Project Components
      - name: Build PeaZip Components
        run: |
          # Build the drag-and-drop helper DLL
          lazbuild dev/dragdropfilesdll/dragdropfilesdll.lpi
          
          # Build the main GUI (Peach)
          lazbuild project_peach.lpi
          
          # Build the backend engine (Pea)
          lazbuild project_pea.lpi

      # 5. Collect and Upload Binaries
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: PeaZip-Windows-Build
          path: |
            peazip.exe
            pea.exe
            dev/dragdropfilesdll/dragdropfilesdll.dll
          retention-days: 5
          
