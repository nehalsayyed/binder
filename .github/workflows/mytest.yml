name:  Run

on:
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    container:
      image: ubuntu:26.04
    
    steps:
      - name: Update 
        # We use --sync to get the latest package definitions
        run: apt update && apt install fastfetch -y 

      
      - name: Run Fastfetch
        run: fastfetch
        
