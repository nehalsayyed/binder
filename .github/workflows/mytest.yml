name: Build Compose Debug APK

on:
  workflow_dispatch: # Allows you to run this manually from the Actions tab

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Clone KitchenTimer Repository
        run: |
          git clone https://github.com/GuilhE/KitchenTimer.git
          cd KitchenTimer
          # Optional: checkout a specific branch if needed
          # git checkout main

      - name: Set Execution Permissions
        run: chmod +x KitchenTimer/gradlew

      - name: Build Debug APK
        run: |
          cd KitchenTimer
          ./gradlew assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: kitchen-timer-debug-apk
          # Path to the generated APK
          path: KitchenTimer/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 5
          
