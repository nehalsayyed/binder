name: Capture Windows System Info
on: 
  workflow_dispatch:

jobs:
  record-and-report:
    runs-on: windows-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Start Recording (Background)
        # We use a 5-second delay to ensure the GDI desktop session is initialized
        run: |
          Start-Sleep -Seconds 5
          $ffmpegArgs = "-f gdigrab -framerate 30 -i desktop -vcodec libx264 -pix_fmt yuv420p -preset ultrafast -y capture.mp4"
          Start-Process ffmpeg -ArgumentList $ffmpegArgs -NoNewWindow
          Start-Sleep -Seconds 2
          Get-Process ffmpeg # Verify it started
        shell: powershell

      - name: Run System Information Tools
        run: |
          # 1. Run CLI tool (fast)
          systeminfo
          
          # 2. Open GUI tool (visual)
          start msinfo32
          
          # Wait so the video actually captures the window
          Start-Sleep -Seconds 20 
        shell: powershell

      - name: Stop Recording Gracefully
        # We kill the process tree (/T). 
        # Removing /F (Force) allows FFmpeg to finish the file safely.
        run: |
          taskkill /IM ffmpeg.exe /T
          Start-Sleep -Seconds 5
        shell: cmd
        if: always()

      - name: Upload Video and Logs
        uses: actions/upload-artifact@v4
        with:
          name: windows-system-capture
          path: |
            capture.mp4
          if-no-files-found: error
          retention-days: 3
