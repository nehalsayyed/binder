name: Cross-Compile for Android (Full Source)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          repository: leejet/stable-diffusion.cpp
          submodules: recursive

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r27d

      - name: Build
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
          # These flags force minimal memory usage
          CXXFLAGS: "-O0 -g0 -fno-exceptions -fno-rtti -fno-inline -pipe"
        run: |
          mkdir build && cd build
          
          # We omit -DSD_USE_SYSTEM_WEBP=ON to force building from thirdparty/
          cmake .. \
            -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-24 \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_SHARED_LIBS=OFF
            
          # Run make with -j1 to guarantee serial compilation (low memory footprint)
          make -j1

      - name: Upload Binary
        uses: actions/upload-artifact@v4
        with:
          name: stable-diffusion-android
          path: build/bin/
          
