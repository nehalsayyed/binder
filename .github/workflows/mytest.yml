name: Build Arti Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          repository: 'guardianproject/tormobile/arti-mobile-ex'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: armv7-linux-androideabi, aarch64-linux-android, i686-linux-android, x86_64-linux-android

      - name: Set up Android SDK & NDK
        uses: android-actions/setup-android@v3

      # GitHub Ubuntu runners have NDKs at $ANDROID_SDK_ROOT/ndk-bundle or $ANDROID_SDK_ROOT/ndk/<version>
      - name: Install cargo-ndk
        run: cargo install cargo-ndk

      - name: Build with Gradle
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug
        env:
          # Pointing to the pre-installed NDK on the runner
          ANDROID_NDK_HOME: ${{ env.ANDROID_SDK_ROOT }}/ndk/25.2.9519653

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: arti-mobile-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          
