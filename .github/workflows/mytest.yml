name:  Run

on:
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    
    
    steps:
      - name: Update 
        # We use --sync to get the latest package definitions
        run: sudo apt update && sudo apt install git -y

      
      - name: Run Fastfetch
        run: | 
          git clone https://github.com/plantuml/plantuml.git
          cd plantuml 
          docker build -t pluml .
        
