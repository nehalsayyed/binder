name: run-test-project

on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest
    
    
    steps:
      # This clones a public "Calculator" project into the runner
      - name: Checkout Public Sample
        uses: actions/checkout@v4
        with:
          repository: 'googlesamples/android-architecture-components'
          ref: 'main'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Build Project
        # Using --no-daemon is better for CI environments
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
           name: sample-apk
           # This will find any APKs generated by the build
           path: "**/build/outputs/apk/debug/*.apk"
           
