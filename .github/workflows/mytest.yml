name: Build uv ARM64 with Docker

on:
  workflow_dispatch:

jobs:
  build:
    # Uses GitHub's native ARM64 Ubuntu runner
    runs-on: ubuntu-24.04-arm64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Clone astral-sh/uv
        run: |
          git clone https://github.com/astral-sh/uv.git
          cd uv
          # Defaults to the main/default branch

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build uv via Docker
        run: |
          cd uv
          # Native build (no --platform needed on ARM64 runner)
          docker build -t uv-builder .
          
          # Extract the ARM64 binary
          docker create --name extract uv-builder
          docker cp extract:/usr/bin/uv ./uv-bin
          docker rm extract

      - name: Upload uv ARM64 Binary
        uses: actions/upload-artifact@v4
        with:
          name: uv-binary-arm64
          path: uv/uv-bin
          retention-days: 5
          
