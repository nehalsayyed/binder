name: Android Emulator & AVF Check
on: workflow_dispatch

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Check Virtualization Support (AVF/KVM)
        run: |
          echo "--- CPU Info ---"
          lscpu | grep -E "Virtualization|Hypervisor"
          echo "--- KVM Check ---"
          # On standard Ubuntu runners, this usually returns '0' (no KVM)
          ls /dev/kvm || echo "KVM device not found. Using software rendering."
          echo "--- AVF Kernel Driver Check ---"
          ls /sys/class/misc/pkvm || echo "AVF/pKVM not supported on this kernel."

      - name: Install Android Emulator & Tools
        run: |
          echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --install "emulator" "system-images;android-34;google_apis;x86_64"

      - name: Create AVD
        run: |
          echo "no" | $ANDROID_HOME/cmdline-tools/latest/bin/avdmanager create avd -n test_avd -k "system-images;android-34;google_apis;x86_64" --force

      - name: Run Emulator and Check AVF Support
        run: |
          # Start emulator in background with software rendering
          # -accel off is required for Ubuntu runners
          $ANDROID_HOME/emulator/emulator -avd test_avd -no-window -no-audio -no-boot-anim -accel off > /dev/null 2>&1 &
          
          # Wait for boot
          adb wait-for-device
          echo "Emulator is up. Checking AVF properties..."
          
          # Check for AVF / Microdroid support inside the emulator
          adb shell getprop | grep virt
          adb shell ls /apex/com.android.virt/bin/vm || echo "AVF binary not found in system image."
          
