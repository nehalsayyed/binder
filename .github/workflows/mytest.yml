name:  Run

on:
  workflow_dispatch:

jobs:
  run:
    runs-on: windows-latest
    
    
    steps:
      - name: Update 
        # We use --sync to get the latest package definitions
        run: choco install fastfetch kotlinc openjdk17 -y

      
      - name: Run Fastfetch
        run: | 
          fastfetch
          kotlin --version
        
