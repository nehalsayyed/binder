name: Cross-Compile for Android

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r27d

      - name: Build for Android aarch64
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: |
          mkdir build && cd build
          # Configure CMake with the NDK toolchain
          cmake .. \
            -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-24 \
            -DSD_USE_SYSTEM_WEBP=ON \
            -DCMAKE_BUILD_TYPE=Release
            
          # Build with a single job to prevent OOM
          make -j1

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: stable-diffusion-android
          path: build/bin/  # Adjust path based on where your binary is generated
          
