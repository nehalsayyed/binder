name: Build llama.cpp for Android (Vulkan)

on:
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Clone llama.cpp
        uses: actions/checkout@v4
        with:
          repository: ggerganov/llama.cpp
          fetch-depth: 1

      - name: Install Vulkan SDK (Provides glslc)
        uses: humbletim/setup-vulkan-sdk@v1.2.1
        with:
          vulkan-query-version: 1.3.268.0
          vulkan-components: Vulkan-Headers, Glslang

      - name: Set up Android NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r26b

      - name: Build with CMake
        run: |
          mkdir build-android
          cd build-android
          # We force CMake to use the NDK's internal Vulkan lib and the SDK's headers
          cmake .. \
            -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-28 \
            -DGGML_VULKAN=ON \
            -DVULKAN_HEADERS_INSTALL_DIR=$VULKAN_SDK \
            -DCMAKE_BUILD_TYPE=Release
          
          make -j$(nproc)

      - name: Upload Binaries
        uses: actions/upload-artifact@v4
        with:
          name: llama-vulkan-android
          path: |
            build-android/bin/llama-cli
            build-android/bin/llama-server
            
