name: Generic ARM64 CPU Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Manual Clone
        run: |
          git clone --depth 1 https://github.com/ggml-org/llama.cpp .
          git submodule update --init --recursive

      - name: Install Tools
        run: sudo apt update && sudo apt install -y cmake ninja-build build-essential

      - name: Build Generic
        run: |
          mkdir build && cd build
          # -march=armv8-a makes the binary run on ANY arm64 phone
          # -DGGML_NATIVE=OFF prevents the server from using its own high-end instructions
          cmake .. -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DGGML_VULKAN=OFF \
            -DGGML_NATIVE=OFF \
            -DCMAKE_C_FLAGS="-march=armv8-a" \
            -DCMAKE_CXX_FLAGS="-march=armv8-a"
          
          ninja llama-cli llama-server llama-quantize

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: llama-generic-arm64
          path: |
            build/
            
