name: Cross-Compile for Android (Full Source)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          repository: leejet/stable-diffusion.cpp
          submodules: recursive

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r27d

      - name: Build
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
          CXXFLAGS: "-O0 -g0 -fno-exceptions -fno-rtti -fno-inline -pipe"
        run: |
          # 1. Start fresh: Remove any previous build files
          rm -rf build
          mkdir build && cd build
          
          # 2. Configure with OpenMP explicitly disabled
          cmake .. \
            -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-24 \
            -DGGML_OPENMP=OFF \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_SHARED_LIBS=OFF
            
          # 3. Build single-threaded to prevent OOM
          make -j1

      - name: Upload Binary
        uses: actions/upload-artifact@v4
        with:
          name: stable-diffusion-android
          path: build/bin/  # The binary is placed here
          
