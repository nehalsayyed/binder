name:  Run

on:
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    
    
    steps:
      - name: Update 
        # We use --sync to get the latest package definitions
        run: sudo apt update && sudo apt install fastfetch -y

      
      - name: Run Fastfetch
        run: | 
          fastfetch
        
