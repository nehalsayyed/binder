name: Build for Android (Termux)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          repository: leejet/stable-diffusion.cpp
          submodules: recursive

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r27d

      - name: Build
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: |
          mkdir build && cd build
          # The cmake command uses the NDK toolchain to target ARM64
          cmake .. \
            -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-24 \
            -DSD_USE_SYSTEM_WEBP=ON \
            -DCMAKE_BUILD_TYPE=Release
            
          # Limit jobs to 1 to prevent OOM on memory-constrained environments
          make -j1

      - name: Upload Binary
        uses: actions/upload-artifact@v4
        with:
          name: stable-diffusion-android
          # The binary is usually named 'sd' or 'stable-diffusion'
          path: build/
          
