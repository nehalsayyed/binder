name: Build llama.cpp Vulkan Android (NDK + Shaders)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      ANDROID_NDK_VERSION: r26d
      ABI: arm64-v8a
      API_LEVEL: 24

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git cmake ninja-build build-essential \
            libvulkan-dev glslang-tools wget unzip

      - name: Download NDK
        run: |
          wget https://dl.google.com/android/repository/android-ndk-${ANDROID_NDK_VERSION}-linux.zip
          unzip android-ndk-${ANDROID_NDK_VERSION}-linux.zip
          echo "NDK_ROOT=$PWD/android-ndk-${ANDROID_NDK_VERSION}" >> $GITHUB_ENV

      - name: Clone llama.cpp
        run: |
          git clone https://github.com/ggerganov/llama.cpp.git
          cd llama.cpp
          git submodule update --init --recursive

      # 🔥 Build shaders (IMPORTANT)
      - name: Compile Vulkan shaders (SPIR-V)
        run: |
          cd llama.cpp
          mkdir -p build-android/shaders
          
          find . -name "*.comp" | while read file; do
            out="build-android/shaders/$(basename $file).spv"
            echo "Compiling $file -> $out"
            glslangValidator -V "$file" -o "$out"
          done

      - name: Configure
        run: |
          cd llama.cpp
          cmake -S . -B build-android \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_TOOLCHAIN_FILE=$NDK_ROOT/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=${ABI} \
            -DANDROID_PLATFORM=android-${API_LEVEL} \
            -DLLAMA_VULKAN=ON \
            -DVulkan_INCLUDE_DIR=/usr/include \
            -DVulkan_LIBRARY=/usr/lib/x86_64-linux-gnu/libvulkan.so \
            -DLLAMA_BUILD_TESTS=OFF \
            -DLLAMA_BUILD_EXAMPLES=OFF

      - name: Build
        run: |
          cd llama.cpp
          cmake --build build-android -j$(nproc)

      - name: Package
        run: |
          mkdir -p output
          cp -r llama.cpp/build-android/bin output/
          cp -r llama.cpp/build-android/lib output/ || true
          cp -r llama.cpp/build-android/shaders output/

      - uses: actions/upload-artifact@v4
        with:
          name: llama-android-vulkan-mali
          path: output/
