name: Build llama.cpp ARM64 (CPU Only)

on:
  push:
  workflow_dispatch: # Allows manual trigger from the UI

jobs:
  build-arm64:
    # Native 2026 ARM64 runner (faster & more accurate for mobile builds)
    runs-on: ubuntu-24.04-arm
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Build Tools
        run: |
          sudo apt update
          sudo apt install -y build-essential cmake ninja-build

      - name: Configure CMake
        # GGML_NATIVE=ON optimizes for the ARM architecture of the runner
        # GGML_VULKAN=OFF ensures no GPU/Vulkan dependencies
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DGGML_NATIVE=ON \
            -DGGML_VULKAN=OFF \
            -DGGML_OPENMP=OFF

      - name: Build
        run: cmake --build build --config Release -j $(nproc)

      - name: Verify Binary
        run: |
          ./build/bin/llama-cli --version
          # Ensure no Vulkan or external GPU libs are linked
          ldd ./build/bin/llama-cli

      - name: Upload Binaries
        uses: actions/upload-artifact@v4
        with:
          name: llama-arm64-cpu-only
          path: |
            build/bin/llama-cli
            build/bin/llama-server
            build/bin/llama-quantize
            
