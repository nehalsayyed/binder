name: Build MNN Android Wheel

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout MNN
        uses: actions/checkout@v4
        with:
          repository: alibaba/MNN
          submodules: recursive

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r27d

      - name: Build MNN and Python Bindings
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: |
          # Create build directory
          mkdir build && cd build
          
          # Cross-compile for arm64-v8a (standard for most modern Android)
          cmake .. \
            -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-24 \
            -DMNN_BUILD_PYMNN=ON \
            -DCMAKE_BUILD_TYPE=Release
            
          make -j$(nproc)
          
          # Prepare the Python package
          # The pymnn/setup.py expects the compiled libs in specific locations
          cd ../pymnn
          python3 setup.py bdist_wheel

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MNN-android-wheel
          path: pymnn/dist/*.whl
          
