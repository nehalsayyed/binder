name: Build Solr

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # CRITICAL: This MUST be the very first step. 
      # It pulls your code so the next step actually has files to look at.
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Now that files exist, setup-java won't crash on the 'cache' instruction.
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Make Gradle Executable
        run: chmod +x gradlew

      # Using --no-daemon is more stable in CI environments
      - name: Build Solr
        run: ./gradlew assemble --no-daemon

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: solr-dist
          path: solr/packaging/build/distributions/
          
