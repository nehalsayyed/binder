name: ARM64 Postgres Infrastructure

on:
  workflow_dispatch: # Allows manual triggering

jobs:
  postgres-arm:
    # Use the native ARM64 runner (Standard in 2026)
    runs-on: ubuntu-24.04-arm
    
    services:
      # This runs the ARM64 version of Postgres natively
      postgres:
        image: arm64v8/postgres:16-alpine
        env:
          POSTGRES_USER: dev_user
          POSTGRES_PASSWORD: dev_password
          POSTGRES_DB: dev_db
        ports:
          - 5432:5432
        # Health check to ensure DB is ready before steps run
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Verify Architecture
        run: |
          echo "Current CPU Architecture:"
          uname -m
          lscpu | grep "Model name"

      - name: Test Database Connection
        run: |
          sudo apt-get update && sudo apt-get install -y postgresql-client
          PGPASSWORD=dev_password psql -h localhost -U dev_user -d dev_db -c "SELECT version();"

      - name: Your Innovation Task
        run: |
          echo "Running your custom GNU/ARM64 logic here..."
          # Add your docker or compilation commands here
          
