name: Build ImageGlass

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      # 1. Checkout into the ROOT directory
      - name: Checkout ImageGlass
        uses: actions/checkout@v4
        with:
          repository: d2phap/ImageGlass
          fetch-depth: 1
          path: '.' # This ensures 'Source' is at the root level

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2

      # 2. Restore NuGet Packages
      - name: Restore NuGet Packages
        run: nuget restore Source/ImageGlass.sln

      # 3. Build the Solution
      - name: Build ImageGlass (Release)
        run: |
          msbuild Source/ImageGlass.sln `
            -p:Configuration=Release `
            -p:Platform="Any CPU" `
            -m

      # 4. Upload the Build Artifacts
      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ImageGlass-Binary
          # Using a wildcard to find the output regardless of the .NET version
          path: Source/ImageGlass/bin/Release/**
          retention-days: 5
          
