name: Generate & Build Empty iOS App

on:
  workflow_dispatch:
    inputs:
      app_name:
        description: 'The name of your new iOS Application'
        required: true
        default: 'BonsaiApp'
      bundle_id:
        description: 'The Bundle Identifier (e.g., com.example.app)'
        required: true
        default: 'com.example.bonsaiapp'

jobs:
  generate-and-compile:
    runs-on: macos-14

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Scaffold New SwiftUI App Structure
        run: |
          APP_NAME="${{ github.event.inputs.app_name }}"
          BUNDLE_ID="${{ github.event.inputs.bundle_id }}"
          
          echo "Creating directory structure for $APP_NAME..."
          mkdir -p "$APP_NAME/$APP_NAME"
          
          # 1. Create the App Entry Point (SwiftUI)
          cat << 'EOF' > "$APP_NAME/$APP_NAME/${APP_NAME}App.swift"
          import SwiftUI

          @main
          struct MyGeneratedApp: App {
              var body: some Scene {
                  WindowGroup {
                      ContentView()
                  }
              }
          }
          EOF

          # 2. Create the Primary User Interface View (Fixed VUIStack typo here)
          cat << 'EOF' > "$APP_NAME/$APP_NAME/ContentView.swift"
          import SwiftUI

          struct ContentView: View {
              var body: some View {
                  VStack {
                      Image(systemName: "cpu")
                          .imageScale(.large)
                          .foregroundColor(.accentColor)
                      Text("Hello, World!")
                          .font(.title)
                          .padding()
                      Text("Generated and Built entirely via GitHub Actions.")
                          .font(.caption)
                          .foregroundColor(.gray)
                  }
                  .padding()
              }
          }
          EOF

          # 3. Create Info.plist file
          cat << 'EOF' > "$APP_NAME/$APP_NAME/Info.plist"
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleIdentifier</key>
              <string>IDENTITY_TEMPLATE</string>
              <key>CFBundleName</key>
              <string>NAME_TEMPLATE</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>CFBundleShortVersionString</key>
              <string>1.0</string>
              <key>CFBundleVersion</key>
              <string>1</string>
              <key>LSRequiresIPhoneOS</key>
              <true/>
          </dict>
          </plist>
          EOF

          # Swap out templates for inputs inside safe text blocks
          sed -i '' "s/IDENTITY_TEMPLATE/${BUNDLE_ID}/g" "$APP_NAME/$APP_NAME/Info.plist"
          sed -i '' "s/NAME_TEMPLATE/${APP_NAME}/g" "$APP_NAME/$APP_NAME/Info.plist"
          
          echo "SwiftUI application code generation complete."
        shell: bash

      - name: Generate Xcode Project File Structure
        run: |
          APP_NAME="${{ github.event.inputs.app_name }}"
          BUNDLE_ID="${{ github.event.inputs.bundle_id }}"
          
          mkdir -p "$APP_NAME/$APP_NAME.xcodeproj"
          
          # CHANGED: 'EOF' prevents bash from corrupting xcode comments like /* Begin ... */
          cat << 'EOF' > "$APP_NAME/$APP_NAME.xcodeproj/project.pbxproj"
          // !$*UTF8*$!
          {
              archiveVersion = 1;
              classes = {};
              objectVersion = 56;
              objects = {
                  /* Begin PBXBuildFile section */
                  10010001/* APP_NAMEApp.swift in Sources */ = {isa = PBXBuildFile; fileRef = 20010001/* APP_NAMEApp.swift */; };
                  10010002/* ContentView.swift in Sources */ = {isa = PBXBuildFile; fileRef = 20010002/* ContentView.swift */; };
                  /* End PBXBuildFile section */

                  /* Begin PBXFileReference section */
                  20010001/* APP_NAMEApp.swift */ = {isa = PBXFileReference; lastKnownFileType = sourcecode.swift; path = "APP_NAMEApp.swift"; sourceTree = "<group>"; };
                  20010002/* ContentView.swift */ = {isa = PBXFileReference; lastKnownFileType = sourcecode.swift; path = ContentView.swift; sourceTree = "<group>"; };
                  20010003/* Info.plist */ = {isa = PBXFileReference; lastKnownFileType = text.plist.xml; path = Info.plist; sourceTree = "<group>"; };
                  30010001/* APP_NAME.app */ = {isa = PBXFileReference; explicitFileType = wrapper.application; includeInIndex = 0; path = "APP_NAME.app"; sourceTree = BUILT_PRODUCTS_DIR; };
                  /* End PBXFileReference section */

                  /* Begin PBXFrameworksBuildPhase section */
                  40010001/* Frameworks */ = {isa = PBXFrameworksBuildPhase; buildActionMask = 2147483647; files = (); runOnlyForDeploymentPostprocessing = 0; };
                  /* End PBXFrameworksBuildPhase section */

                  /* Begin PBXGroup section */
                  50010001 = {
                      isa = PBXGroup;
                      children = (
                          50010002/* APP_NAME */,
                          30010001/* APP_NAME.app */,
                      );
                      sourceTree = "<group>";
                  };
                  50010002/* APP_NAME */ = {
                      isa = PBXGroup;
                      children = (
                          20010001/* APP_NAMEApp.swift */,
                          20010002/* ContentView.swift */,
                          20010003/* Info.plist */,
                      );
                      path = "APP_NAME";
                      sourceTree = "<group>";
                  };
                  /* End PBXGroup section */

                  /* Begin PBXNativeTarget section */
                  60010001/* APP_NAME */ = {
                      isa = PBXNativeTarget;
                      buildConfigurationList = 70010001/* Build configuration list for PBXNativeTarget "APP_NAME" */;
                      buildPhases = (
                          80010001/* Sources */,
                          40010001/* Frameworks */,
                      );
                      buildRules = (
                      );
                      dependencies = (
                      );
                      name = "APP_NAME";
                      productName = "APP_NAME";
                      productReference = 30010001/* APP_NAME.app */;
                      productType = "com.apple.product-type.application";
                  };
                  /* End PBXNativeTarget section */

                  /* Begin PBXProject section */
                  90010001/* Project object */ = {
                      isa = PBXProject;
                      attributes = {
                          LastSwiftUpdateCheck = 1500;
                          LastUpgradeCheck = 1500;
                      };
                      buildConfigurationList = 70010004/* Build configuration list for PBXProject */;
                      compatibilityVersion = "Xcode 14.0";
                      developmentRegion = en;
                      hasScannedForEncodings = 0;
                      knownRegions = (
                          en,
                          Base,
                      );
                      mainGroup = 50010001;
                      productRefGroup = 50010001;
                      projectDirPath = "";
                      projectRoot = "";
                      targets = (
                          60010001/* APP_NAME */,
                      );
                  };
                  /* End PBXProject section */

                  /* Begin PBXSourcesBuildPhase section */
                  80010001/* Sources */ = {
                      isa = PBXSourcesBuildPhase;
                      buildActionMask = 2147483647;
                      files = (
                          10010001/* APP_NAMEApp.swift in Sources */,
                          10010002/* ContentView.swift in Sources */,
                      );
                      runOnlyForDeploymentPostprocessing = 0;
                  };
                  /* End PBXSourcesBuildPhase section */

                  /* Begin XCBuildConfiguration section */
                  70010002/* Debug */ = {
                      isa = XCBuildConfiguration;
                      buildSettings = {
                          ASSETCATALOG_COMPILER_APPICON_NAME = AppIcon;
                          ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME = AccentColor;
                          CODE_SIGNING_ALLOWED = NO;
                          CODE_SIGNING_REQUIRED = NO;
                          CODE_SIGN_IDENTITY = "";
                          DONT_GENERATE_INFOPLIST_FILE = YES;
                          INFOPLIST_FILE = "APP_NAME/Info.plist";
                          LD_RUNPATH_SEARCH_PATHS = "$(inherited) @executable_path/Frameworks";
                          MARKETING_VERSION = 1.0;
                          PRODUCT_BUNDLE_IDENTIFIER = "BUNDLE_TEMPLATE";
                          PRODUCT_NAME = "$(TARGET_NAME)";
                          SWIFT_VERSION = 5.0;
                          TARGETED_DEVICE_FAMILY = "1,2";
                      };
                      name = Debug;
                  };
                  70010003/* Release */ = {
                      isa = XCBuildConfiguration;
                      buildSettings = {
                          ASSETCATALOG_COMPILER_APPICON_NAME = AppIcon;
                          ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME = AccentColor;
                          CODE_SIGNING_ALLOWED = NO;
                          CODE_SIGNING_REQUIRED = NO;
                          CODE_SIGN_IDENTITY = "";
                          DONT_GENERATE_INFOPLIST_FILE = YES;
                          INFOPLIST_FILE = "APP_NAME/Info.plist";
                          LD_RUNPATH_SEARCH_PATHS = "$(inherited) @executable_path/Frameworks";
                          MARKETING_VERSION = 1.0;
                          PRODUCT_BUNDLE_IDENTIFIER = "BUNDLE_TEMPLATE";
                          PRODUCT_NAME = "$(TARGET_NAME)";
                          SWIFT_VERSION = 5.0;
                          TARGETED_DEVICE_FAMILY = "1,2";
                      };
                      name = Release;
                  };
                  70010005/* Debug */ = {
                      isa = XCBuildConfiguration;
                      buildSettings = {
                          ALWAYS_SEARCH_USER_PATHS = NO;
                          CLANG_ANALYZER_NONNULL = YES;
                          CLANG_CXX_LANGUAGE_STANDARD = "gnu++20";
                          CLANG_ENABLE_MODULES = YES;
                          CLANG_ENABLE_OBJC_ARC = YES;
                          ENABLE_STRICT_OBJC_MSGSEND = YES;
                          GCC_NO_COMMON_BLOCKS = YES;
                          IPHONEOS_DEPLOYMENT_TARGET = 17.0;
                          SDKROOT = iphoneos;
                      };
                      name = Debug;
                  };
                  70010006/* Release */ = {
                      isa = XCBuildConfiguration;
                      buildSettings = {
                          ALWAYS_SEARCH_USER_PATHS = NO;
                          CLANG_ANALYZER_NONNULL = YES;
                          CLANG_CXX_LANGUAGE_STANDARD = "gnu++20";
                          CLANG_ENABLE_MODULES = YES;
                          CLANG_ENABLE_OBJC_ARC = YES;
                          ENABLE_STRICT_OBJC_MSGSEND = YES;
                          GCC_NO_COMMON_BLOCKS = YES;
                          IPHONEOS_DEPLOYMENT_TARGET = 17.0;
                          SDKROOT = iphoneos;
                      };
                      name = Release;
                  };
                  /* End XCBuildConfiguration section */

                  /* Begin XCConfigurationList section */
                  70010001/* Build configuration list for PBXNativeTarget "APP_NAME" */ = {
                      isa = XCConfigurationList;
                      buildConfigurations = (
                          70010002/* Debug */,
                          70010003/* Release */,
                      );
                      defaultConfigurationName = Release;
                      defaultConfigurationIsVisible = 0;
                  };
                  70010004/* Build configuration list for PBXProject */ = {
                      isa = XCConfigurationList;
                      buildConfigurations = (
                          70010005/* Debug */,
                          70010006/* Release */,
                      );
                      defaultConfigurationName = Release;
                      defaultConfigurationIsVisible = 0;
                  };
                  /* End XCConfigurationList section */
              };
              rootObject = 90010001/* Project object */;
          }
          EOF

          # Inject parameters cleanly using safe substitutions
          sed -i '' "s/APP_NAME/${APP_NAME}/g" "$APP_NAME/$APP_NAME.xcodeproj/project.pbxproj"
          sed -i '' "s/BUNDLE_TEMPLATE/${BUNDLE_ID}/g" "$APP_NAME/$APP_NAME.xcodeproj/project.pbxproj"
        shell: bash

      - name: Build Application using Xcode Command Line Tools
        run: |
          APP_NAME="${{ github.event.inputs.app_name }}"
          cd "$APP_NAME"
          
          xcodebuild -project "${APP_NAME}.xcodeproj" \
                     -scheme "${APP_NAME}" \
                     -configuration Release \
                     -sdk iphoneos \
                     CODE_SIGNING_ALLOWED=NO \
                     CODE_SIGNING_REQUIRED=NO \
                     clean build
                     
      - name: Package Compiled Bundle into .IPA File
        run: |
          APP_NAME="${{ github.event.inputs.app_name }}"
          
          mkdir -p Payload
          cp -r /Users/runner/Library/Developer/Xcode/DerivedData/*/Build/Products/Release-iphoneos/${APP_NAME}.app Payload/
          zip -r "${APP_NAME}.ipa" Payload
          
      - name: Upload Complete iOS App Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.app_name }}-unsigned-build
          path: |
            *.ipa
          retention-days: 5
          
