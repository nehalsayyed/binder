name: Manual ARM64 CPU Build (No Checkout)

on:
  workflow_dispatch: # Allows you to run this manually from the Actions tab

jobs:
  build-arm64:
    # Using the native 2026 ARM64 runner for maximum compatibility with your phone
    runs-on: ubuntu-24.04-arm

    steps:
      - name: Manual Clone and Submodule Sync
        run: |
          # Clone the latest stable version of llama.cpp
          git clone --depth 1 https://github.com/ggml-org/llama.cpp .
          # Crucial: Fetch the math engine (ggml) and other dependencies
          git submodule update --init --recursive

      - name: Install Build Dependencies
        run: |
          sudo apt update
          sudo apt install -y cmake ninja-build build-essential

      - name: Configure and Build (CPU Only)
        run: |
          # Create build directory
          mkdir build && cd build
          
          # -DGGML_VULKAN=OFF: Ensures no GPU/Vulkan dependencies
          # -DGGML_NATIVE=ON: Optimizes for the runner's ARMv8/v9 features
          # -DCMAKE_BUILD_TYPE=Release: Enables full compiler optimizations
          cmake .. -G Ninja \
            -DGGML_VULKAN=OFF \
            -DGGML_NATIVE=ON \
            -DCMAKE_BUILD_TYPE=Release
          
          # Compile using all available CPU threads
          ninja llama-cli llama-server llama-quantize

      - name: Verify Binary Linkage
        run: |
          echo "Checking for Vulkan dependencies (should be empty):"
          ldd ./build/bin/llama-cli | grep -i vulkan || echo "No Vulkan found - Success"

      - name: Upload Binaries
        uses: actions/upload-artifact@v4
        with:
          name: llama-arm64-cpu-manual
          path: |
            build/bin/llama-cli
            build/bin/llama-server
            build/bin/llama-quantize
            
