name: Build Tor Arti APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Manual Clone from GitLab
      - name: Clone GitLab Repository
        run: |
          git clone https://gitlab.com/guardianproject/tormobile/arti-mobile-ex.git .
          git submodule update --init --recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: armv7-linux-androideabi, aarch64-linux-android, i686-linux-android, x86_64-linux-android

      - name: Install cargo-ndk
        run: cargo install cargo-ndk

      - name: Build with Gradle
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug
        env:
          # Using the NDK version typically pre-installed on GitHub Runners
          ANDROID_NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/25.2.9519653

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: arti-mobile-debug-apk
          path: |
             app/build/outputs/apk/debug/*.apk
             */build/outputs/apk/debug/*.apk
             
