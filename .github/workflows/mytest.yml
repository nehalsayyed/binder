name: Build ImageGlass

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout ImageGlass
        uses: actions/checkout@v4
        with:
          repository: d2phap/ImageGlass
          fetch-depth: 1
          path: '.' 

      # 1. Setup the Full MSBuild (instead of just dotnet)
      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      # 2. Setup NuGet for the old-style restoration
      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2

      # 3. Use NuGet to restore the .slnx (or .sln if it exists)
      # If .slnx fails, try restoring the specific project files
      - name: Restore Packages
        run: nuget restore Source/ImageGlass.slnx

      # 4. Build using the FULL MSBuild 
      # This version supports "ResolveComReference"
      - name: Build ImageGlass
        run: |
          msbuild Source/ImageGlass.slnx `
            -p:Configuration=Release `
            -p:Platform="Any CPU" `
            -p:RuntimeIdentifier=win-x64 `
            -m

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ImageGlass-Binary
          path: Source/ImageGlass/bin/Release/net8.0-windows/
          retention-days: 5
          
