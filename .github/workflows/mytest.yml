name: Build Flutter ARM64 Offline
on: 
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout Flutter
        run: |
          git clone https://github.com/flutter/flutter.git -b stable
          cd flutter
          ./bin/flutter --version

      - name: Precache ARM64 Artifacts
        run: |
          cd flutter
          # Automatically grabs ARM64 artifacts because the runner is ARM64
          ./bin/flutter precache --linux --no-android --no-ios --universal

      - name: Clean unnecessary files
        run: |
          rm -rf flutter/.git
          rm -rf flutter/bin/cache/artifacts/gradle_wrapper

      - name: Compress (High Compression XZ)
        run: |
          # Use -T0 to use all CPU cores for faster compression
          tar -cf - flutter/ | xz -9 -T0 > flutter-arm64-stable.tar.xz

      - name: Generate Checksum
        run: sha256sum flutter-arm64-stable.tar.xz > checksum.txt

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: flutter-offline-bundle
          path: |
            flutter-arm64-stable.tar.xz
            checksum.txt
          retention-days: 7  # Artifacts expire, unlike releases
          
