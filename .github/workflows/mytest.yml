name: Build llama.cpp (Android NDK + Vulkan)

on:
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest

    env:
      ANDROID_NDK_VERSION: r26d
      ABI: arm64-v8a
      API_LEVEL: 24

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git cmake ninja-build build-essential \
            wget unzip

      - name: Download Android NDK
        run: |
          wget https://dl.google.com/android/repository/android-ndk-${ANDROID_NDK_VERSION}-linux.zip
          unzip android-ndk-${ANDROID_NDK_VERSION}-linux.zip
          echo "NDK_ROOT=$PWD/android-ndk-${ANDROID_NDK_VERSION}" >> $GITHUB_ENV

      - name: Clone llama.cpp
        run: |
          git clone https://github.com/ggerganov/llama.cpp.git
          cd llama.cpp
          git submodule update --init --recursive

      - name: Configure build (Vulkan + NDK)
        run: |
          cd llama.cpp
          cmake -S . -B build-android \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_TOOLCHAIN_FILE=$NDK_ROOT/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=${ABI} \
            -DANDROID_PLATFORM=android-${API_LEVEL} \
            -DLLAMA_VULKAN=ON \
            -DLLAMA_BUILD_TESTS=OFF \
            -DLLAMA_BUILD_EXAMPLES=ON

      - name: Build
        run: |
          cd llama.cpp
          cmake --build build-android -j$(nproc)

      - name: Package artifacts
        run: |
          mkdir -p output
          cp -r llama.cpp/build-android/bin output/
          cp -r llama.cpp/build-android/lib output/ || true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: llama-android-vulkan
          path: output/
