name: Build MNN Python Wheel

on:
  workflow_dispatch:

jobs:
  build-wheel:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout MNN
        uses: actions/checkout@v4
        with:
          repository: alibaba/MNN
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install wheel setuptools

      - name: Build Wheel
        run: |
          # Navigate to the python directory of MNN
          cd pymnn
          
          # MNN usually provides a script to build the python binding
          # This command creates the .whl file in the dist/ folder
          python3 setup.py bdist_wheel

      - name: Upload Wheel
        uses: actions/upload-artifact@v4
        with:
          name: MNN-wheel
          path: pymnn/dist/*.whl
          
