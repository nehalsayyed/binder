name: Build llama.cpp Native ARM64

on:
  workflow_dispatch:

jobs:
  build-native-arm64:
    runs-on: ubuntu-24.04-arm 
    
    steps:
      - name: Clone llama.cpp
        run: |
          git clone https://github.com/ggerganov/llama.cpp.git
          cd llama.cpp
          git submodule update --init --recursive

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake

      - name: Configure and Build
        run: |
          cd llama.cpp
          # Using -B build automatically creates the build directory
          cmake -B build \
            -DBUILD_SHARED_LIBS=ON \
            -DCMAKE_BUILD_TYPE=Release \
            -DLLAMA_NATIVE=ON
          cmake --build build --config Release -j $(nproc)

      - name: Upload Full Build Folder
        uses: actions/upload-artifact@v4
        with:
          name: llama-cpp-full-build-arm64
          # Path points directly to the generated build directory
          path: llama.cpp/build/
          # Optional: compression-level can be set from 0 to 9
          compression-level: 6
          
