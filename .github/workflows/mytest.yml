name: Build Solr

on:
  workflow_dispatch:
    inputs:
      build_args:
        description: 'Additional Gradle arguments (e.g., -PskipTests)'
        required: false
        default: ''

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Make Gradle Wrapper Executable
        run: chmod +x gradlew

      - name: Build with Gradle
        # Running 'assemble' builds the artifacts without running full tests
        run: ./gradlew assemble ${{ github.event.inputs.build_args }}

      - name: Archive Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: solr-dist
          path: solr/packaging/build/distributions/
          
