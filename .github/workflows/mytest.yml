name: run

on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: maven:3-openjdk-17
    steps:
      - name: run
        run: |
          apt update -y && apt install git -y
          git clone https://github.com/HouariZegai/Calculator.git
          cd Calculator 
          mvn package 
          
