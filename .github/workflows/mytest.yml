name: Clone and Build OpenClaw APK

on:
  workflow_dispatch: # Manual trigger from the "Actions" tab

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      # 1. Clone the official OpenClaw repository
      - name: Clone OpenClaw
        run: git clone https://github.com/openclaw/openclaw.git .

      # 2. Setup Java 17 (Required for Android Gradle)
      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      # 3. Setup Node.js 22
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # 4. Install dependencies and Build UI
      # OpenClaw is a monorepo; we need to build the core and UI first
      - name: Install and Build Core
        run: |
          npm install -g pnpm
          pnpm install
          pnpm build

      # 5. Build Android APK
      # The Android project lives in apps/android
      - name: Build Android Debug APK
        run: |
          cd apps/android
          chmod +x gradlew
          ./gradlew :app:assembleDebug

      # 6. Upload the finished APK to GitHub Actions
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: OpenClaw-Android-Debug
          path: apps/android/app/build/outputs/apk/debug/*.apk
          
