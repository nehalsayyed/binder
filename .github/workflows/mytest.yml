name: Build MNN Python Wheel

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          repository: alibaba/MNN
          submodules: recursive

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake python3-dev python3-pip

      - name: Build MNN and Python Bindings
        run: |
          # 1. Create build directory
          mkdir build && cd build
          
          # 2. Configure MNN to build with Python support
          # -DMNN_BUILD_PYMNN=ON is the key flag
          cmake .. \
            -DCMAKE_BUILD_TYPE=Release \
            -DMNN_BUILD_PYMNN=ON \
            -DMNN_BUILD_TRAIN=ON
            
          # 3. Compile
          make -j$(nproc)
          
          # 4. Generate the wheel
          # After building, the project usually generates the setup structure
          # in the 'pymnn' folder or within the build directory.
          cd ../pymnn
          python3 setup.py bdist_wheel

      - name: Upload Wheel
        uses: actions/upload-artifact@v4
        with:
          name: mnn-wheel
          path: pymnn/dist/*.whl
          
