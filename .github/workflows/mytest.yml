name:  Run

on:
  workflow_dispatch:

jobs:
  run:
    runs-on: macos-latest
    
    
    steps:
      - name: Update 
        # We use --sync to get the latest package definitions
        run: brew install fastfetch kotlin

      
      - name: Run Fastfetch
        run: | 
          fastfetch
          kotlin --version
          kotlin 
        
