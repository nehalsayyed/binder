name: Build Optimized SD Binary
on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v3
        with:
          repository: leejet/stable-diffusion.cpp
          submodules: recursive

      - name: Install Dependencies
        run: sudo apt-get update && sudo apt-get install -y cmake build-essential libwebp-dev

      - name: Build with G80 Specific Optimizations
        run: |
          mkdir build && cd build
          # -mcpu=cortex-a75: Optimizes for your specific CPU core architecture
          # +simd: Ensures NEON/ASIMD vectorization is used
          # +dotprod: Enables the hardware dot-product acceleration visible in your cpuinfo
          # -O3: Aggressive compiler optimization
          cmake .. -DCMAKE_CXX_FLAGS="-mcpu=cortex-a75+simd+dotprod -O3" -DSD_USE_SYSTEM_WEBP=ON
          make -j$(nproc)

      - name: Verify Build Output
        run: |
          echo "Contents of the build folder:"
          ls -R build/

      - name: Upload Entire Build Folder
        uses: actions/upload-artifact@v4
        with:
          name: sd-full-build-g80
          path: build/
          
