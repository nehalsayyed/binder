name: Run
on: 
  workflow_dispatch:

jobs:
  record-and-report:
    runs-on: ubuntu-24.04-arm
    steps:

      - name: Start Recording (Background)
        # We use a 5-second delay to ensure the GDI desktop session is initialized
        run: |
          sudo apt update -y && sudo apt install neofetch -y && neofetch && lscpu
