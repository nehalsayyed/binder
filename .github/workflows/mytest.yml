name: Build Compose Debug APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Setup Java first (without caching)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 2. Clone the repo into the current directory
      - name: Clone KitchenTimer Repository
        run: |
          git clone https://github.com/GuilhE/KitchenTimer.git .
          chmod +x gradlew

      # 3. Run the build
      - name: Build Debug APK
        run: ./gradlew assembleDebug

      # 4. Upload the generated APK
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: kitchen-timer-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          
          
